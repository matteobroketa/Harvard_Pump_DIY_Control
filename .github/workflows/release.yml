name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm HarvardUltraControl.spec

      - name: Verify build
        shell: pwsh
        run: |
          if (!(Test-Path "dist/HarvardUltraControl.exe")) {
            Write-Error "Executable not found in dist/"
            exit 1
          }

      - name: Rename executable
        shell: pwsh
        run: |
          Move-Item "dist/HarvardUltraControl.exe" "dist/HarvardUltraControl-Windows-x64.exe"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HarvardUltraControl-Windows-x64
          path: dist/HarvardUltraControl-Windows-x64.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HarvardUltraControl-Windows-x64.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
